name: Bug report
description: Report a reproducible defect or unsafe failure mode
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Never include API keys, account identifiers, private fills, or licensed market data."
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include sanitized configuration and exact steps.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety impact
      description: Could this create risk, duplicate an order, lose lineage, or bypass a gate?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true

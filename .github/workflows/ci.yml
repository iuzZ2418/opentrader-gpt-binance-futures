name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,trader]"

      - name: Lint
        run: python -m ruff check src tests

      - name: Test
        run: python -m pytest -q
